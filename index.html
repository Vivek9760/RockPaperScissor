<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors — Good Luck</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/icons/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="wrapper">

        <!-- HEADER -->
        <header>
            <div class="game-eyebrow">A completely fair game™</div>
            <h1>ROCK<br /><span>PAPER</span><br />SCISSORS</h1>
            <p class="game-sub">vs an AI that definitely isn't cheating</p>
        </header>

        <!-- SCOREBOARD -->
        <div class="scoreboard">
            <div class="score-block">
                <div class="score-label">You</div>
                <div class="score-num" id="scoreYou">0</div>
            </div>
            <div class="score-block">
                <div class="score-label">Draw</div>
                <div class="score-num" id="scoreDraw">0</div>
            </div>
            <div class="score-block">
                <div class="score-label">AI</div>
                <div class="score-num" id="scoreAI">0</div>
            </div>
        </div>

        <!-- ARENA -->
        <div class="arena">
            <div class="player-side">
                <div class="player-label">You</div>
                <div class="choice-display" id="playerDisplay">❓</div>
            </div>

            <div class="vs-block">
                <div class="vs-text">VS</div>
                <div class="thinking" id="thinking">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="player-side">
                <div class="player-label">AI</div>
                <div class="choice-display" id="aiDisplay">❓</div>
            </div>
        </div>

        <!-- RESULT -->
        <div class="result-banner">
            <div class="result-title" id="resultTitle">Pick something.</div>
            <div class="result-quip" id="resultQuip">Don't overthink it, it's rock paper scissors.</div>
        </div>

        <!-- CHOICES -->
        <div class="choices">
            <button class="choice-btn" id="btn-rock" onclick="play('rock')">
                <span class="choice-emoji">🪨</span>
                <span class="choice-name">Rock</span>
            </button>
            <button class="choice-btn" id="btn-paper" onclick="play('paper')">
                <span class="choice-emoji">📄</span>
                <span class="choice-name">Paper</span>
            </button>
            <button class="choice-btn" id="btn-scissors" onclick="play('scissors')">
                <span class="choice-emoji">✂️</span>
                <span class="choice-name">Scissors</span>
            </button>
        </div>

        <!-- FOOTER ROW -->
        <div style="display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; justify-content:center;">
            <div class="round-info" id="roundInfo">Round 0</div>
            <button class="reset-btn" onclick="resetGame()">Reset Everything</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
